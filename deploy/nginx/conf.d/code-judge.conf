# Nginx reverse proxy for docker-compose.production.yml
#
# HTTP:
#   - Domain code-judge.io.vn / www: ACME challenge + redirect → HTTPS
#   - Subdomain api.*              : ACME + redirect → HTTPS
#   - default_server (_)           : proxy web (dùng khi truy cập bằng IP / Host không khớp)
#   - :8080                        : API + Socket.io (NEXT_PUBLIC_CORE_URL dạng http://IP:8080)
#
# HTTPS (443): cần cert tại /etc/letsencrypt/live/LE_CERT_NAME/ (mount từ host).
# Đổi LE_CERT_NAME nếu certbot dùng tên thư mục khác (thường = domain đầu trong lệnh -d).
#
# `resolver` + biến trong proxy_pass: tránh 502 khi container được tạo lại (DNS Docker đổi IP).
#
# API timeout: mặc định nginx ~60s → 504 khi LLM chậm (generate-test-cases-draft, AI hint, …).
# Các server api.* và :8080 dùng proxy_*_timeout 300s (location /socket.io/ giữ 86400).

# ─── ACME (Let's Encrypt) — HTTP-01 qua webroot trên host: deploy/nginx/certbot-webroot ───

# Web production domain → HTTPS
server {
  listen 80;
  server_name code-judge.io.vn www.code-judge.io.vn;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# API subdomain → HTTPS
server {
  listen 80;
  server_name api.*;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── HTTPS — Web (frontend) ─────────────────────────────────────────────────
server {
  listen 443 ssl;
  http2 on;
  server_name code-judge.io.vn www.code-judge.io.vn;

  ssl_certificate     /etc/letsencrypt/live/code-judge.io.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/code-judge.io.vn/privkey.pem;

  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 64m;

  # MinIO S3 (presigned PUT/GET từ trình duyệt). Path = tên bucket (MINIO_BUCKET, mặc định codejudge).
  # MINIO_PUBLIC_BASE_URL=https://code-judge.io.vn — tránh Mixed Content trên trang HTTPS.
  location /codejudge/ {
    set $cj_minio_upstream minio:9000;
    proxy_pass http://$cj_minio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    client_max_body_size 64m;
  }

  location / {
    set $cj_web_upstream web:3001;
    proxy_pass http://$cj_web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ─── HTTPS — API + Socket.io ───────────────────────────────────────────────
server {
  listen 443 ssl;
  http2 on;
  server_name api.*;

  ssl_certificate     /etc/letsencrypt/live/code-judge.io.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/code-judge.io.vn/privkey.pem;

  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 64m;
  proxy_connect_timeout 300s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  location / {
    set $cj_api_upstream core-api:3000;
    proxy_pass http://$cj_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    set $cj_api_upstream core-api:3000;
    proxy_pass http://$cj_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300s;
    proxy_send_timeout 86400;
    proxy_read_timeout 86400;
  }
}

# ─── HTTP fallback: IP hoặc host không thuộc domain trên (ví dụ http://VPS_IP/) ───
server {
  listen 80 default_server;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 64m;

  location / {
    set $cj_web_upstream web:3001;
    proxy_pass http://$cj_web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ─── API trên port riêng (HTTP) — vd. NEXT_PUBLIC_CORE_URL=http://IP:8080 ───
server {
  listen 8080;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 64m;
  proxy_connect_timeout 300s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  location / {
    set $cj_api_upstream core-api:3000;
    proxy_pass http://$cj_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    set $cj_api_upstream core-api:3000;
    proxy_pass http://$cj_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_connect_timeout 300s;
    proxy_send_timeout 86400;
    proxy_read_timeout 86400;
  }
}
