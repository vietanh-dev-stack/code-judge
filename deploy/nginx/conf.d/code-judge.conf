# Nginx reverse proxy for docker-compose.production.yml
# Default: one VPS IP, path-based routing is NOT used — use Host header.
# Set in .env.production:
#   WEB_DOMAIN=your-domain.com
#   API_DOMAIN=api.your-domain.com
# For IP-only test, both can be the same or use default_server below.

upstream cj_web {
  server web:3001;
  keepalive 16;
}

upstream cj_api {
  server core-api:3000;
  keepalive 16;
}

# Web (frontend)
server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 64m;

  location / {
    proxy_pass http://cj_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# API + Socket.io
# - Có subdomain: trỏ api.your-domain.com → VPS, dùng server_name api.your-domain.com;
# - Chỉ có IP: mở port API_HTTP_PORT (mặc định 8080) — xem server block bên dưới.
server {
  listen 80;
  server_name api.*;

  client_max_body_size 64m;

  location / {
    proxy_pass http://cj_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://cj_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }
}

# API trên port riêng (IP-only: NEXT_PUBLIC_CORE_URL=http://VPS_IP:8080)
server {
  listen 8080;
  server_name _;

  client_max_body_size 64m;

  location / {
    proxy_pass http://cj_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://cj_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }
}
